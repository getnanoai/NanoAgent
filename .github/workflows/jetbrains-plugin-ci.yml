name: jetbrains-plugin-ci

on:
  pull_request:
    paths:
      - .github/workflows/jetbrains-plugin-ci.yml
      - NanoAgent.JetBrains/**
  push:
    branches:
      - master
    paths:
      - .github/workflows/jetbrains-plugin-ci.yml
      - NanoAgent.JetBrains/**

concurrency:
  group: jetbrains-plugin-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JETBRAINS_PLUGIN_DIR: NanoAgent.JetBrains

jobs:
  build:
    name: Build JetBrains plugin
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build
        working-directory: ${{ env.JETBRAINS_PLUGIN_DIR }}
        run: gradle build

      - name: Verify plugin
        working-directory: ${{ env.JETBRAINS_PLUGIN_DIR }}
        run: gradle verifyPlugin

      - name: Build plugin ZIP
        working-directory: ${{ env.JETBRAINS_PLUGIN_DIR }}
        run: gradle buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: jetbrains-plugin
          path: NanoAgent.JetBrains/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 14
