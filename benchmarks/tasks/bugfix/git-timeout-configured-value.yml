{
  "id": "git-timeout-configured-value",
  "name": "Return configured git timeout value",
  "suite": "swe-bench-lite-style",
  "workspace": "benchmarks/fixtures/tiny-ts-bug",
  "profile": "build",
  "tags": [
    "regression"
  ],
  "prompt": "Make `resolveGitTimeout` return the validated requested value instead of a hardcoded number. Keep the change to `gitClient.js` and validate with `node gitClient.js`.",
  "validationCommands": [
    {
