{
  "id": "null-byte-env-sanitizer",
  "name": "Fix null-byte sanitizer slicing",
  "suite": "swe-bench-lite-style",
  "workspace": "benchmarks/fixtures/tiny-dotnet-bug",
  "profile": "build",
  "tags": [
    "regression"
  ],
  "prompt": "Repair the null-byte slicing logic in `EnvironmentValueSanitizer`. Only change the source file needed, then run `dotnet run --project TinyDotnetBug.csproj`.",
  "validationCommands": [
    {
      "command": [
        "dotnet",
        "run",
        "--project",
        "TinyDotnetBug.csproj"
      ],
      "expectExitCode": 0,
      "expectStdoutContainsAll": [
        "OK"
      ]
    }
  ],
  "diff": {
    "maxChangedFiles": 1,
    "changedFilesInclude": [
      "Program.cs"
    ],
    "changedFilesExclude": [
      "TinyDotnetBug.csproj"
    ]
  }
}
