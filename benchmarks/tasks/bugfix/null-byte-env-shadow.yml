{
  "id": "null-byte-env-shadow",
  "name": "Drop shadow text after null byte",
  "suite": "swe-bench-lite-style",
  "workspace": "benchmarks/fixtures/tiny-dotnet-bug",
  "profile": "build",
  "tags": [
    "regression"
  ],
  "prompt": "The sanitizer keeps the wrong side of a null-byte value. Make the smallest correct change in `Program.cs` and run `dotnet run --project TinyDotnetBug.csproj`.",
  "validationCommands": [
    {
      "command": [
        "dotnet",
        "run",
        "--project",
        "TinyDotnetBug.csproj"
      ],
      "expectExitCode": 0,
      "expectStdoutContainsAll": [
        "OK"
      ]
    }
  ],
  "diff": {
    "maxChangedFiles": 1,
    "changedFilesInclude": [
      "Program.cs"
    ],
    "changedFilesExclude": [
      "TinyDotnetBug.csproj"
    ]
  }
}
